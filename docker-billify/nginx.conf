server {
    listen 80;
    server_name billify.me www.billify.me;
    root /usr/share/nginx/html;
    index index.html;

    # Billify Stripe API proxy
    # In docker-compose, the api service is reachable at `api` (the compose
    # service name) or `billify-stripe-api` (the container_name). In Coolify
    # deployments, Coolify renames the container but preserves the service name
    # as a network alias, so `api` is the portable DNS name.
    location /api/stripe/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS handled by the API server
    }

    location / {
        # Strip trailing slash (nginx sees /app/ as a directory path, so
        # $uri.html never matches /app.html). Rewrite internally to /app
        # then try the file with .html extension, falling back to SPA.
        rewrite ^/(.*)/$ /$1 last;
        try_files $uri $uri.html /index.html;
    }
}
