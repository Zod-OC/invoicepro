server {
    listen 80;
    server_name billify.me www.billify.me;
    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy — byte-identical to public/_headers (the static-
    # host variant). nginx/Coolify do NOT read _headers, so without this the
    # frame-ancestors 'self' boundary is unenforced and a third-party site can
    # clickjack the /app editor iframe on /invoice-template-for/* pages (and a
    # cross-origin framer of /app?embed=true would otherwise run in host mode —
    # see src/lib/embed.ts isEmbedMode). `always` ensures the header is sent on
    # every response, including error pages. The API proxy block below inherits
    # it too, which is harmless (the API sets its own CORS/headers).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # Referrer-Policy: no-referrer — see public/_headers (byte-identical policy;
    # keep in sync). Stops one-time same-origin handoff/persist/download tokens
    # (in /app?… params, stripped post-mount) from leaking via cross-origin
    # document.referrer on non-strict-default browsers.
    add_header Referrer-Policy "no-referrer" always;

    # Billify Stripe API proxy
    # In docker-compose, the api service is reachable at `api` (the compose
    # service name) or `billify-stripe-api` (the container_name). In Coolify
    # deployments, Coolify renames the container but preserves the service name
    # as a network alias, so `api` is the portable DNS name.
    location /api/stripe/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS handled by the API server
    }

    # Umami analytics (self-hosted, same-origin, cookieless) — proxy the tracker
    # script + beacon to the umami container so they're served from billify.me
    # itself (script-src/connect-src 'self' already permit them; no CSP change).
    # Exact-match /script.js so it never falls through to the static handler.
    location = /script.js {
        proxy_pass http://umami:3000/script.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/send {
        proxy_pass http://umami:3000/api/send;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Strip trailing slash (nginx sees /app/ as a directory path, so
        # $uri.html never matches /app.html). Rewrite internally to /app
        # then try the file with .html extension, falling back to SPA.
        rewrite ^/(.*)/$ /$1 last;
        try_files $uri $uri.html /index.html;
    }
}
