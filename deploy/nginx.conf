# nginx snippet for serving the Billify static export (output:'export' → dist/).
#
# nginx (and Coolify when fronted by nginx) does NOT read the dist/_headers file
# that Netlify/Cloudflare Pages honor. The CSP — including frame-ancestors
# 'self', which browsers ignore in <meta http-equiv> and only honor as an HTTP
# header — must therefore be set here. frame-ancestors is required for the
# same-origin /app iframe embeds on the /invoice-template-for/* pages; without
# it a third-party site could clickjack the editor.
#
# The header below is byte-identical to public/_headers. Keep the two in sync.
#
# Usage: `include deploy/nginx.conf;` inside the server { } block that serves
# the dist/ directory as the site root.

# Serve the static export. Adjust the root to wherever dist/ is published.
root /var/www/billify/dist;

# Clean URLs: /invoice-template-for/electrician resolves to .html, and the
# /app?embed=... iframe src is served without a trailing .html. try_files
# matches the existing file/dir first, then appends .html (Next export emits
# one .html per route), then falls back to a 404.
location / {
    try_files $uri $uri/ $uri.html =404;
}

# The CSP must apply to every document response, so attach it globally.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
# Referrer-Policy: no-referrer — see public/_headers. Byte-identical policy
# across _headers and the nginx confs; keep in sync. Stops one-time same-origin
# handoff/persist/download tokens (in /app?… params, stripped post-mount) from
# leaking via cross-origin document.referrer on non-strict-default browsers.
add_header Referrer-Policy "no-referrer" always;

# Next.js static assets are content-hashed and immutable.
location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# The exported sitemap.xml and robots.txt change on rebuild, so keep them fresh.
location = /sitemap.xml { add_header Cache-Control "public, max-age=3600" always; }
location = /robots.txt   { add_header Cache-Control "public, max-age=3600" always; }

# Umami analytics (self-hosted, same-origin, cookieless): proxy the tracker
# script and beacon to your umami instance so they're served from the site origin
# (script-src/connect-src 'self' already permit them; no CSP change). The
# upstream below is the docker-compose service name — adjust to wherever your
# umami runs. Live blocks mirror docker-billify/nginx.conf (production).
location = /script.js {
    proxy_pass http://umami:3000/script.js;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
location = /api/send {
    proxy_pass http://umami:3000/api/send;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}