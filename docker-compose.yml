# Billify production deployment
# Two services: billify-nginx (static site + Stripe proxy) + billify-stripe-api (Node/Express)
# Both run on the coolify Docker network so Traefik can route to billify-nginx.
#
# Deploy with:
#   docker compose up -d --build
#
# Or via Coolify: register this repo as a "Docker Compose" build pack in the Coolify UI.
# Coolify will respect the labels below and route billify.me → billify-nginx via Traefik.

services:
  # 1. Static site + reverse proxy for /api/stripe/
  # Serves the Next.js static export from /dist and proxies Stripe API calls to the api service.
  nginx:
    build:
      context: .
      dockerfile: docker-billify/Dockerfile
      args:
        # Set to the Umami website ID after creating it in the dashboard.
        # Empty = analytics snippet doesn't render (current behaviour).
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ""
    image: billify:latest
    container_name: billify-nginx
    restart: unless-stopped
    networks:
      - coolify
    # Traefik labels (Coolify's coolify-proxy container reads these)
    labels:
      - traefik.enable=true
      - traefik.http.routers.billify.entrypoints=https
      - "traefik.http.routers.billify.rule=Host(`billify.me`) || Host(`www.billify.me`)"
      - traefik.http.routers.billify.tls=true
      - traefik.http.routers.billify.tls.certresolver=letsencrypt
      - traefik.http.services.billify.loadbalancer.server.port=80

  # 2. Stripe API (Node/Express)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: billify-stripe-api:latest
    container_name: billify-stripe-api
    restart: unless-stopped
    networks:
      - coolify
    # Env vars are auto-injected by Coolify at deploy time. Coolify writes all
    # configured env vars (JWT_SECRET, STRIPE_*, SUCCESS_URL, etc.) to a .env
    # file in the project directory, then mounts it into each service via
    # env_file: .env (added automatically by Coolify). The api/ Dockerfile's
    # `ENV PORT=3000` provides the default port; all other vars come from .env.
    # For standalone deployment without Coolify:
    #   docker compose --env-file api/.env up -d --build
    # Health check: hits the / health endpoint
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 3. Postgres for Umami analytics (lightweight, resource-capped).
  # Named umami-db (NOT 'postgres') to avoid a DNS collision with Coolify's own
  # internal coolify-db container, which aliases 'postgres' on the coolify
  # network — Umami was intermittently connecting to coolify-db and failing auth.
  # Uses a named volume so analytics data survives container rebuilds.
  umami-db:
    image: postgres:16-alpine
    container_name: billify-umami-db
    restart: unless-stopped
    networks:
      - coolify
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: 795b8e7fcdfb16a55375db63aa8f69a64eaf98ac
    volumes:
      - billify-pgdata:/var/lib/postgresql/data
    # Resource limits — the box is small (~2GB), and Coolify + nginx + api
    # already use ~500MB. Postgres-alpine with these caps stays under 150MB RSS.
    deploy:
      resources:
        limits:
          memory: 256M

  # 4. Umami analytics — self-hosted, same-origin, cookieless. Served behind
  # billify-nginx via the /script.js + /api/send proxy blocks (see
  # docker-billify/nginx.conf). NOT a database of invoice data — it stores only
  # analytics aggregates (page views + named events), so it does NOT weaken the
  # no-backend-for-invoices privacy claim.
  # Dashboard accessible at https://analytics.billify.me (wildcard DNS resolves).
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: billify-umami
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      - umami-db
    environment:
      APP_URL: https://analytics.billify.me
      # Individual components (NOT a DATABASE_URL) — Coolify's secret scanner
      # redacts credentials embedded in URL strings (replacing them with literal
      # '***'), but does NOT redact standalone password values. The command
      # override below assembles DATABASE_URL at runtime from these parts.
      DB_PASSWORD: 795b8e7fcdfb16a55375db63aa8f69a64eaf98ac
      UMAMI_SALT: 3df04bbb86d9d1e3d52c637caef82768
    # Construct DATABASE_URL at runtime so Coolify never sees a credential URL
    # in the environment block (which it would redact to '***').
    # $$ in docker-compose escapes to $ so the shell expands the vars, not compose.
    command: >
      sh -c "export DATABASE_URL=postgresql://umami:$$DB_PASSWORD@umami-db:5432/umami &&
             export HASH_SALT=$$UMAMI_SALT &&
             npm run start-docker"
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.entrypoints=https
      - traefik.http.routers.umami.rule=Host(`analytics.billify.me`)
      - traefik.http.routers.umami.tls=true
      - traefik.http.routers.umami.tls.certresolver=letsencrypt
      - traefik.http.services.umami.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  billify-pgdata:

# Use the existing coolify Docker network (created by Coolify itself)
networks:
  coolify:
    name: coolify
    external: true
