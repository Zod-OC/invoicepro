# Billify production deployment
# Two services: billify-nginx (static site + Stripe proxy) + billify-stripe-api (Node/Express)
# Both run on the coolify Docker network so Traefik can route to billify-nginx.
#
# Deploy with:
#   docker compose up -d --build
#
# Or via Coolify: register this repo as a "Docker Compose" build pack in the Coolify UI.
# Coolify will respect the labels below and route billify.me → billify-nginx via Traefik.

services:
  # 1. Static site + reverse proxy for /api/stripe/
  # Serves the Next.js static export from /dist and proxies Stripe API calls to the api service.
  nginx:
    build:
      context: .
      dockerfile: docker-billify/Dockerfile
    image: billify:latest
    container_name: billify-nginx
    restart: unless-stopped
    networks:
      - coolify
    # Traefik labels (Coolify's coolify-proxy container reads these)
    labels:
      - traefik.enable=true
      - traefik.http.routers.billify.entrypoints=https
      - "traefik.http.routers.billify.rule=Host(`billify.me`) || Host(`www.billify.me`)"
      - traefik.http.routers.billify.tls=true
      - traefik.http.routers.billify.tls.certresolver=letsencrypt
      - traefik.http.services.billify.loadbalancer.server.port=80

  # 2. Stripe API (Node/Express)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: billify-stripe-api:latest
    container_name: billify-stripe-api
    restart: unless-stopped
    networks:
      - coolify
    # Env vars are auto-injected by Coolify at deploy time. Coolify writes all
    # configured env vars (JWT_SECRET, STRIPE_*, SUCCESS_URL, etc.) to a .env
    # file in the project directory, then mounts it into each service via
    # env_file: .env (added automatically by Coolify). The api/ Dockerfile's
    # `ENV PORT=3000` provides the default port; all other vars come from .env.
    # For standalone deployment without Coolify:
    #   docker compose --env-file api/.env up -d --build
    # Health check: hits the / health endpoint
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 3. Umami analytics — self-hosted, same-origin, cookieless. Served behind
  # billify-nginx via the /script.js + /api/send proxy blocks (see
  # docker-billify/nginx.conf). NOT a database of invoice data — it stores only
  # analytics aggregates (page views + named events), so it does NOT weaken the
  # no-backend-for-invoices privacy claim.
  #
  # Ops prerequisites (the parallel ops track — NOT in this repo):
  #  - A Postgres reachable from the coolify network. Preferred: a managed
  #    Postgres added via the Coolify UI (avoids running a second Postgres on the
  #    ~1GB box alongside Coolify's own). Point DATABASE_URL at it.
  #  - DATABASE_URL + HASH_SALT injected via Coolify's project env (Coolify
  #    writes them to .env and mounts env_file into this service automatically).
  #  - After first boot (the image auto-runs schema migrations), create a Website
  #    in Umami and set NEXT_PUBLIC_UMAMI_WEBSITE_ID in Coolify env, then rebuild
  #    the site so the /script.js snippet in src/app/layout.tsx renders.
  # Until then this container will fail its healthcheck and restart — but that
  # does NOT affect the nginx/api services (independent containers).
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: billify-umami
    restart: unless-stopped
    networks:
      - coolify
    environment:
      APP_URL: https://billify.me
      # DATABASE_URL and HASH_SALT come from the Coolify project env file.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

# Use the existing coolify Docker network (created by Coolify itself)
networks:
  coolify:
    name: coolify
    external: true
